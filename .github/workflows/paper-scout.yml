name: Paper Scout

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: paper-scout-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate rules, idempotency, and live source payloads
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
        run: |
          set -o pipefail
          python -m paper_scout evaluate-relevance --track agent_memory | tee relevance-eval-agent-memory.log
          python -m paper_scout evaluate-relevance --track deep_research | tee relevance-eval-deep-research.log
          python -m paper_scout validate-idempotency --track agent_memory | tee idempotency-agent-memory.log
          python -m paper_scout validate-idempotency --track deep_research | tee idempotency-deep-research.log
          PAPER_SCOUT_STATE_PATH=${{ runner.temp }}/paper_scout_agent_memory_smoke.sqlite3 python -m paper_scout smoke-live --track agent_memory --days 14 --max-results-per-source 25 --no-notify --ci | tee live-smoke-agent-memory.log
          PAPER_SCOUT_STATE_PATH=${{ runner.temp }}/paper_scout_deep_research_smoke.sqlite3 python -m paper_scout smoke-live --track deep_research --days 14 --max-results-per-source 25 --no-notify --ci | tee live-smoke-deep-research.log

      - name: Run daily paper scout
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
          PAPER_SCOUT_LLM_PROVIDER: ${{ secrets.PAPER_SCOUT_LLM_PROVIDER }}
          PAPER_SCOUT_LLM_MODEL: ${{ secrets.PAPER_SCOUT_LLM_MODEL }}
          PAPER_SCOUT_LLM_API_KEY: ${{ secrets.PAPER_SCOUT_LLM_API_KEY }}
          PAPER_SCOUT_LLM_BASE_URL: ${{ secrets.PAPER_SCOUT_LLM_BASE_URL }}
          PAPER_SCOUT_WEBHOOK_URL: ${{ secrets.PAPER_SCOUT_WEBHOOK_URL }}
        run: |
          set -o pipefail
          python -m paper_scout run --track agent_memory | tee paper-scout-run-agent-memory.log
          python -m paper_scout build-site --track agent_memory | tee paper-scout-build-site-agent-memory.log
          python -m paper_scout run --track deep_research | tee paper-scout-run-deep-research.log
          python -m paper_scout build-site --track deep_research | tee paper-scout-build-site-deep-research.log

      - name: Write run summary
        if: always()
        run: |
          {
            echo "## Paper Scout"
            echo
            echo "### Command output"
            echo
            echo '```text'
            cat relevance-eval-agent-memory.log relevance-eval-deep-research.log idempotency-agent-memory.log idempotency-deep-research.log live-smoke-agent-memory.log live-smoke-deep-research.log paper-scout-run-agent-memory.log paper-scout-build-site-agent-memory.log paper-scout-run-deep-research.log paper-scout-build-site-deep-research.log 2>/dev/null || true
            echo '```'
            echo
            echo "### Generated files"
            find digests reports -type f 2>/dev/null | sort || true
            find docs -type f 2>/dev/null | sort || true
            echo
            echo "### Live smoke report"
            for report in reports/paper_scout/live-smoke-*.md; do
              [ -f "$report" ] || continue
              cat "$report"
            done
            echo
            echo "### Live smoke JSON"
            for report in reports/paper_scout/live-smoke-*.json; do
              [ -f "$report" ] || continue
              echo '```json'
              cat "$report"
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-scout-reports
          path: |
            reports/paper_scout/
            docs/
            *.log
          if-no-files-found: ignore

      - name: Commit scout updates
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/paper_scout.sqlite3 data/deep_research/paper_scout.sqlite3 digests docs reports/paper_scout
          if git diff --cached --quiet; then
            echo "No paper scout changes to commit."
          else
            git commit -m "chore: update paper scout digest"
            git push
          fi

      - name: Configure GitHub Pages
        if: success()
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4
